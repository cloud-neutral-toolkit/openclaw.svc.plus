name: XWorkmate
options:
  bundleIdPrefix: plus.svc
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

packages:
  OpenClawKit:
    path: ../shared/OpenClawKit
  Swabble:
    path: ../../Swabble
  MenuBarExtraAccess:
    url: https://github.com/orchetect/MenuBarExtraAccess
    version: 1.2.2
  Subprocess:
    url: https://github.com/swiftlang/swift-subprocess.git
    version: 0.1.0
  swiftLog:
    url: https://github.com/apple/swift-log.git
    version: 1.10.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.9.0
  Peekaboo:
    url: https://github.com/steipete/Peekaboo.git
    branch: main

targets:
  OpenClawIPC:
    type: framework
    platform: macOS
    sources:
      - path: Sources/OpenClawIPC
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

  OpenClawDiscovery:
    type: framework
    platform: macOS
    sources:
      - path: Sources/OpenClawDiscovery
    dependencies:
      - package: OpenClawKit
        product: OpenClawKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

  XWorkmate:
    type: application
    platform: macOS
    sources:
      - path: Sources/OpenClaw
        excludes:
          - Resources/Info.plist
    dependencies:
      - target: OpenClawIPC
      - target: OpenClawDiscovery
      - package: OpenClawKit
        product: OpenClawKit
      - package: OpenClawKit
        product: OpenClawChatUI
      - package: OpenClawKit
        product: OpenClawProtocol
      - package: Swabble
        product: SwabbleKit
      - package: MenuBarExtraAccess
        product: MenuBarExtraAccess
      - package: Subprocess
        product: Subprocess
      - package: swiftLog
        product: Logging
      - package: Sparkle
        product: Sparkle
      - package: Peekaboo
        product: PeekabooBridge
      - package: Peekaboo
        product: PeekabooAutomationKit
    info:
      path: Sources/OpenClaw/Resources/Info.plist
      properties:
        CFBundleDisplayName: XWorkmate
        CFBundleName: XWorkmate
        CFBundleIdentifier: plus.svc.xworkmate
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "N3G9T67W78"
        PRODUCT_BUNDLE_IDENTIFIER: "plus.svc.xworkmate"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/OpenClaw/XWorkmate.entitlements
    postBuildScripts:
      - name: "Patch Sparkle Sandbox Entitlements"
        script: |
          if [ -d "$CODESIGNING_FOLDER_PATH/Contents/Frameworks/Sparkle.framework" ]; then
            ENTITLEMENTS="$SRCROOT/Sources/OpenClaw/XWorkmate.entitlements"
            ID="${EXPANDED_CODE_SIGN_IDENTITY:-$CODE_SIGN_IDENTITY}"
            if [ -z "$ID" ] || [ "$ID" = "-" ]; then
              echo "No valid code sign identity found, skipping."
              exit 0
            fi
            echo "Re-signing Sparkle binaries with Sandbox entitlement..."
            codesign --force --sign "$ID" --options runtime --entitlements "$ENTITLEMENTS" "$CODESIGNING_FOLDER_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate" || true
            codesign --force --sign "$ID" --options runtime --entitlements "$ENTITLEMENTS" "$CODESIGNING_FOLDER_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app/Contents/MacOS/Updater" || true
            codesign --force --sign "$ID" --options runtime --entitlements "$ENTITLEMENTS" "$CODESIGNING_FOLDER_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc/Contents/MacOS/Downloader" || true
            codesign --force --sign "$ID" --options runtime --entitlements "$ENTITLEMENTS" "$CODESIGNING_FOLDER_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc/Contents/MacOS/Installer" || true
            codesign --force --sign "$ID" --options runtime --entitlements "$ENTITLEMENTS" "$CODESIGNING_FOLDER_PATH/Contents/Frameworks/Sparkle.framework" || true
          fi
